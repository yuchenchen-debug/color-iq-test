<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

.btn{background:linear-gradient(135deg,var(--primary),#00cc6a);color:#0a0a0f;border:none;padding:16px 48px;border-radius:50px;font-size:18px;font-weight:800;cursor:pointer;transition:all .2s;letter-spacing:1px;touch-action:manipulation}

.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid #333;padding:12px 24px;font-size:14px}

/* Game Screen */
#game-screen{justify-content:flex-start;padding-top:16px;gap:12px}

.tile.wrong{animation:wrong-shake .4s ease}
@keyframes correct-pop{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes wrong-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* Misc */

@media(max-width:360px){
  h1{font-size:24px}

<script>
// Firebase init
const firebaseConfig={apiKey:"AIzaSyC977FBxgGqVCrEjYc_J5JlefMWNCgffg0",authDomain:"yuchenchen-60a08.firebaseapp.com",databaseURL:"https://yuchenchen-60a08-default-rtdb.firebaseio.com",projectId:"yuchenchen-60a08"};
let db;
try{firebase.initializeApp(firebaseConfig);db=firebase.database()}catch(e){console.warn('Firebase init failed, using localStorage fallback')}

// Game State
let level=0,lives=3,score=0,timerInterval=null,timeLeft=0,maxTime=0;
let baseHue=0,diffTileIndex=-1,gridSize=2;
let roundColors=[],wrongTaps=0,colorHistory=[];
let personalBest=parseInt(localStorage.getItem('coloriq-pb'))||0;
let gameActive=false;

// Show personal best
if(personalBest>0){document.getElementById('pb-display').style.display='block';document.getElementById('pb-val').textContent='Level '+personalBest}

// Fake total with slight randomness
const fakeBase=2847000+Math.floor(Math.random()*999);
const fakeTotal=fakeBase.toLocaleString();
document.getElementById('total-tests').textContent=fakeTotal;

// Screen management
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function goHome(){clearInterval(timerInterval);showScreen('start-screen')}

// Grid size for level
function getGridSize(lv){
  if(lv<=2)return 2;if(lv<=4)return 3;if(lv<=7)return 4;if(lv<=11)return 5;
  if(lv<=16)return 6;if(lv<=22)return 7;return 8;
}

// Color difference for level (hue offset)
function getHueDiff(lv){
  // Starts at 30, decreasing. At level 30+ it's ~2-3
  const diff=Math.max(2,32-lv*1.05);
  return diff;
}

// Time for level
function getTime(lv){
  if(lv<=3)return 10;if(lv<=8)return 9;if(lv<=15)return 7;if(lv<=22)return 6;return 5;
}

// Start game
function startGame(){
  level=0;lives=3;wrongTaps=0;colorHistory=[];gameActive=true;
  showScreen('game-screen');
  nextLevel();
}

// Next level
function nextLevel(){
  level++;
  gridSize=getGridSize(level);
  const hueDiff=getHueDiff(level);
  maxTime=getTime(level);
  timeLeft=maxTime;

  // Random base color
  baseHue=Math.floor(Math.random()*360);
  const baseSat=60+Math.floor(Math.random()*25);
  const baseLit=40+Math.floor(Math.random()*20);

  // Direction of hue shift (random + or -)
  const dir=Math.random()>.5?1:-1;
  const diffHue=(baseHue+hueDiff*dir+360)%360;

  const totalTiles=gridSize*gridSize;
  diffTileIndex=Math.floor(Math.random()*totalTiles);

  const baseColor=`hsl(${baseHue},${baseSat}%,${baseLit}%)`;
  const diffColor=`hsl(${diffHue},${baseSat}%,${baseLit}%)`;

  colorHistory.push({hue:baseHue,diff:hueDiff,grid:gridSize});

  // Update HUD
  document.getElementById('hud-level').textContent=level;
  document.getElementById('hud-grid').textContent=gridSize+'x'+gridSize;
  updateLives();
  updateTimer();

  // Taunt
  updateTaunt();

  // Next level hint
  if(level>1){
    const nextGrid=getGridSize(level+1);
    const nextDiff=getHueDiff(level+1).toFixed(1);
    document.getElementById('next-hint').textContent=nextGrid>gridSize?`下一關：${nextGrid}x${nextGrid} 格`:'';
  }else{
    document.getElementById('next-hint').textContent='';
  }

  // Build grid
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns=`repeat(${gridSize},1fr)`;

  for(let i=0;i<totalTiles;i++){
    const tile=document.createElement('div');
    tile.className='tile';
    tile.style.background=i===diffTileIndex?diffColor:baseColor;
    tile.dataset.idx=i;
    tile.addEventListener('click',()=>onTileClick(tile,i));
    grid.appendChild(tile);
  }

  // Flash level
  if(level>1){
    const flash=document.getElementById('level-flash');
    flash.textContent='Level '+level;
    flash.classList.remove('show');
    void flash.offsetWidth;
    flash.classList.add('show');
  }

  // Start timer
  startTimer();
}

function onTileClick(tile,idx){
  if(!gameActive)return;
  if(idx===diffTileIndex){
    tile.classList.add('correct');
    clearInterval(timerInterval);
    setTimeout(()=>nextLevel(),350);
  }else{
    tile.classList.add('wrong');
    wrongTaps++;
    lives--;
    updateLives();
    if(lives<=0){endGame();return}
    setTimeout(()=>tile.classList.remove('wrong'),400);
  }
}

function updateLives(){
  const h=document.getElementById('hud-lives');
  h.innerHTML='❤️'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
}

function startTimer(){
  clearInterval(timerInterval);
  const fill=document.getElementById('timer-fill');
  fill.style.width='100%';
  fill.className='timer-fill';

  const startTime=Date.now();
  const duration=maxTime*1000;

  timerInterval=setInterval(()=>{
    const elapsed=Date.now()-startTime;
    const remaining=Math.max(0,duration-elapsed);
    const pct=(remaining/duration)*100;
    timeLeft=Math.ceil(remaining/1000);

    fill.style.width=pct+'%';
    document.getElementById('hud-timer').textContent=timeLeft+'s';

    if(pct<30)fill.className='timer-fill danger';
    else if(pct<60)fill.className='timer-fill warning';
    else fill.className='timer-fill';

    if(remaining<=0){clearInterval(timerInterval);endGame()}
  },50);
}

function updateTaunt(){
  const taunts={
    low:["你是色盲嗎？","這也太簡單了吧","幼稚園等級","閉眼都能過"],
    mid:["普通人類水準","不好不壞","繼續加油吧","一般般"],
    good:["眼力不錯","你的錐狀細胞還活著","有點東西","開始認真了？"],
    great:["鷹眼級別","你不是普通人","超越90%的人","厲害了"],
    insane:["超越人類極限","你確定不是螳螂蝦？","人類不該能看到這個","你的視網膜是改造過的嗎"],
    alien:["外星人","這個差異連儀器都很難分辨","你在開掛吧","色覺之神"],
    god:["不可能。你作弊了吧？","已通報色覺實驗室","你不是人類","超出測量範圍"]
  };
  let pool;
  if(level<=5)pool=taunts.low;
  else if(level<=10)pool=taunts.mid;
  else if(level<=15)pool=taunts.good;
  else if(level<=20)pool=taunts.great;
  else if(level<=25)pool=taunts.insane;
  else if(level<=30)pool=taunts.alien;
  else pool=taunts.god;
  document.getElementById('game-taunt').textContent=pool[Math.floor(Math.random()*pool.length)];
}

function endGame(){
  gameActive=false;
  clearInterval(timerInterval);
  score=level-1;

  // Personal best
  const isNewPB=score>personalBest;
  if(isNewPB){personalBest=score;localStorage.setItem('coloriq-pb',personalBest)}
  document.getElementById('pb-display').style.display='block';
  document.getElementById('pb-val').textContent='Level '+personalBest;

  showScreen('result-screen');
  renderResult(isNewPB);
}

function getRank(s){
  if(s>=30)return{rank:'SSS',cls:'sss',pct:'前 0.01%',pctNum:0.01};
  if(s>=25)return{rank:'SS',cls:'ss',pct:'前 0.1%',pctNum:0.1};
  if(s>=20)return{rank:'S',cls:'s-rank',pct:'前 1%',pctNum:1};
  if(s>=15)return{rank:'A',cls:'a-rank',pct:'前 5%',pctNum:5};
  if(s>=10)return{rank:'B',cls:'b-rank',pct:'前 20%',pctNum:20};
  if(s>=6)return{rank:'C',cls:'c-rank',pct:'前 50%',pctNum:50};
  if(s>=3)return{rank:'D',cls:'low-rank',pct:'前 75%',pctNum:75};
  return{rank:'F',cls:'low-rank',pct:'建議掛眼科',pctNum:99};
}

function getResultMsg(s){
  if(s>=30)return"不可能。你作弊了吧？已通報色覺實驗室。";
  if(s>=25)return"你確定不是螳螂蝦轉世？超越人類極限。";
  if(s>=20)return"鷹眼級別。你的錐狀細胞異常發達。";
  if(s>=15)return"眼力相當不錯，擊敗了95%的測試者。";
  if(s>=10)return"普通人類水準，不好不壞。";
  if(s>=6)return"勉強及格，你的眼睛需要多休息。";
  if(s>=3)return"你是色盲嗎？建議找眼科醫生看看。";
  return"...你確定有在看螢幕嗎？";
}

function renderResult(isNewPB){
  const r=getRank(score);

  document.getElementById('result-rank').textContent=r.rank;
  document.getElementById('result-rank').className='result-rank '+r.cls;
  document.getElementById('result-level').textContent=score;
  document.getElementById('result-msg').textContent=getResultMsg(score);
  document.getElementById('result-percentile').innerHTML='你的成績排名：<span>'+r.pct+'</span>';
  document.getElementById('pb-notice').style.display=isNewPB?'block':'none';

  // Next goal
  const nextMilestones=[3,6,10,15,20,25,30];
  const nextM=nextMilestones.find(m=>m>score);
  if(nextM){
    const nextR=getRank(nextM);
    document.getElementById('next-goal').innerHTML='距離 <span>'+nextR.rank+'</span> 級還差 <span>'+(nextM-score)+'</span> 關';
  }else{
    document.getElementById('next-goal').textContent='你已經到達頂峰。';
  }

  // Same rank percentage
  const pcts={SSS:'0.01%',SS:'0.09%',S:'0.9%',A:'4%',B:'15%',C:'30%',D:'25%',F:'25%'};
  document.getElementById('same-rank-pct').textContent=pcts[r.rank]||'15%';
  document.getElementById('result-total-tests').textContent=fakeTotal;

  // Weakness analysis
  renderWeakness();
}

function renderWeakness(){
  const items=document.getElementById('weakness-items');
  items.innerHTML='';

  // Analyze color ranges
  const hueRanges=[{name:'紅色系',min:0,max:30},{name:'橙黃色系',min:30,max:75},{name:'綠色系',min:75,max:165},{name:'青藍色系',min:165,max:255},{name:'紫色系',min:255,max:330},{name:'粉紅色系',min:330,max:360}];

  const avgReaction='0.'+(3+Math.floor(Math.random()*5))+'s';
  const accuracy=lives>0?Math.round(((level-1)/((level-1)+wrongTaps))*100):Math.round(((level-2)/((level-2)+wrongTaps))*100);

  const data=[
    ['平均反應速度',avgReaction],
    ['準確率',Math.max(0,accuracy)+'%'],
    ['失誤次數',wrongTaps+'次'],
    ['最終格子大小',gridSize+'x'+gridSize],
    ['最小色差辨識',getHueDiff(score).toFixed(1)+'°']
  ];

  // Find hardest hue range
  if(colorHistory.length>2){
    const lastHue=colorHistory[colorHistory.length-1].hue;
    const range=hueRanges.find(r=>lastHue>=r.min&&lastHue<r.max)||hueRanges[0];
    data.push(['最後挑戰色系',range.name]);
  }

  data.forEach(([label,val])=>{
    const d=document.createElement('div');
    d.className='item';
    d.innerHTML=label+'<span>'+val+'</span>';
    items.appendChild(d);
  });
}

function generateShareImage(){
  return new Promise(resolve=>{
    const c=document.getElementById('share-canvas');
    const ctx=c.getContext('2d');
    const w=1080,h=1080;

    // Background
    ctx.fillStyle='#0a0a0f';
    ctx.fillRect(0,0,w,h);

    // Decorative grid pattern
    const r=getRank(score);
    ctx.globalAlpha=0.08;
    for(let i=0;i<8;i++){
      for(let j=0;j<8;j++){
        ctx.fillStyle=(i+j)%2===0?'#00ff88':'#ff2d55';
        ctx.fillRect(i*135,j*135,130,130);
      }
    }
    ctx.globalAlpha=1;

    // Dark overlay for readability
    const grad=ctx.createRadialGradient(540,540,100,540,540,600);
    grad.addColorStop(0,'rgba(10,10,15,0.95)');
    grad.addColorStop(1,'rgba(10,10,15,0.7)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,w,h);

    // Title
    ctx.fillStyle='#00ff88';
    ctx.font='bold 48px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('👁️ 色覺測試 Color IQ Test',540,160);

    // Rank
    const rankColors={SSS:'#ff00ff',SS:'#ff00ff',S:'#ffaa00',A:'#00ff88',B:'#4488ff',C:'#e0e0e0',D:'#666',F:'#666'};
    ctx.fillStyle=rankColors[r.rank]||'#00ff88';
    ctx.font='bold 180px sans-serif';
    ctx.fillText(r.rank,540,420);

    // Level
    ctx.fillStyle='#e0e0e0';
    ctx.font='bold 36px sans-serif';
    ctx.fillText('到達關卡',540,500);
    ctx.fillStyle='#00ff88';
    ctx.font='bold 96px sans-serif';
    ctx.fillText('Level '+score,540,610);

    // Percentile
    ctx.fillStyle='#ff2d55';
    ctx.font='bold 32px sans-serif';
    ctx.fillText(r.pct,540,680);

    // Taunt
    ctx.fillStyle='#e0e0e0';
    ctx.font='28px sans-serif';
    ctx.fillText(getResultMsg(score),540,750);

    // Blocks
    const blocks='🟩'.repeat(Math.min(score,10))+'⬛'.repeat(Math.max(0,10-score));
    ctx.font='36px sans-serif';
    ctx.fillText(blocks,540,820);

    // CTA
    ctx.fillStyle='#666';
    ctx.font='24px sans-serif';
    ctx.fillText('你能超過我嗎？',540,900);
    ctx.fillStyle='#00ff88';
    ctx.font='bold 22px sans-serif';
    ctx.fillText('yuchenchen-debug.github.io/color-iq-test',540,940);

    // Border
    ctx.strokeStyle='#00ff88';
    ctx.lineWidth=4;
    ctx.strokeRect(20,20,w-40,h-40);

    resolve(c.toDataURL('image/png'));
  });
}

// Leaderboard / Firebase
function submitScore(){
  const nick=document.getElementById('nickname-input').value.trim()||'匿名';
  const entry={name:nick,score:score,rank:getRank(score).rank,ts:Date.now()};

  // Save to localStorage
  let local=JSON.parse(localStorage.getItem('coloriq-lb')||'[]');
  local.push(entry);
  local.sort((a,b)=>b.score-a.score);
  local=local.slice(0,50);
  localStorage.setItem('coloriq-lb',JSON.stringify(local));

  // Save to Firebase
  if(db){
    try{db.ref('color-scores').push(entry)}catch(e){console.warn('Firebase write failed')}
  }

  document.getElementById('nickname-section').innerHTML='<div style="color:var(--primary);font-weight:700">✅ 已送出！</div>';
  showLeaderboard();
}

function showLeaderboard(){
  document.getElementById('lb-modal').classList.add('active');
  const list=document.getElementById('lb-list');
  list.innerHTML='<div style="text-align:center;color:var(--text-dim);padding:20px">載入中...</div>';

  // Try Firebase first
  if(db){
    db.ref('color-scores').orderByChild('score').limitToLast(20).once('value').then(snap=>{
      const entries=[];
      snap.forEach(child=>{entries.push(child.val())});
      entries.sort((a,b)=>b.score-a.score);
      renderLeaderboard(entries);
    }).catch(()=>{renderLeaderboard(getLocalLB())});
  }else{
    renderLeaderboard(getLocalLB());
  }
}

function getLocalLB(){
  return JSON.parse(localStorage.getItem('coloriq-lb')||'[]').sort((a,b)=>b.score-a.score).slice(0,20);
}

function renderLeaderboard(entries){
  const list=document.getElementById('lb-list');
  if(!entries.length){list.innerHTML='<div style="text-align:center;color:var(--text-dim);padding:20px">還沒有紀錄，成為第一個！</div>';return}
  list.innerHTML=entries.slice(0,20).map((e,i)=>{
    const rCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const r=getRank(e.score);
    return`<div class="lb-entry"><div class="lb-rank ${rCls}">#${i+1}</div><div class="lb-name">${escHtml(e.name)}</div><div class="lb-score">Lv.${e.score}</div><div class="lb-grade" style="color:${
      e.score>=25?'#ff00ff':e.score>=20?'#ffaa00':e.score>=15?'#00ff88':'var(--text-dim)'
    }">${r.rank}</div></div>`;
  }).join('');
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function closeLeaderboard(){document.getElementById('lb-modal').classList.remove('active')}
function closeLBIfOutside(e){if(e.target===document.getElementById('lb-modal'))closeLeaderboard()}
